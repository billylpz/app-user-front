<section class="p-5 flex justify-center">
  <div class="p-10 shadow-2xl rounded-md">
    <h1 class="mb-10 text-center text-2xl font-semibold">REGISTRO DE USUARIO</h1>

    <form (ngSubmit)="onSubmit()" [formGroup]="myForm" class=" flex flex-col gap-5 ">
      <div class="flex  flex-col w-full">

        <div class="flex gap-3">
          <label for="name" class="w-20">Name<span class="text-red-400">*</span> </label>
          <input type="text" id="name" formControlName="name" class="border px-2">
        </div>

        <app-form-error-label [control]="myForm.get('name')!" />

      </div>

      <div class="flex  flex-col">
        <div class="flex gap-3">
          <label for="lastname" class="w-20">Lastname<span class="text-red-400">*</span></label>
          <input type="text" id="lastname" formControlName="lastname" class="border px-2">
        </div>
        <app-form-error-label [control]="myForm.get('lastname')!" />
      </div>

      <div class="flex  flex-col">
        <div class="flex gap-3">
          <label for="email" class="w-20">Email<span class="text-red-400">*</span></label>
          <input type="email" id="email" formControlName="email" class="border px-2">
        </div>
        <app-form-error-label [control]="myForm.get('email')!" />
      </div>

      <div class="flex  flex-col">
        <div class="flex gap-3">
          <label for="cellphone" class="w-20">Cellphone<span class="text-red-400">*</span></label>
          <input type="text" id="cellphone" formControlName="cellphone" class="border px-2">
        </div>
        <app-form-error-label [control]="myForm.get('cellphone')!" />
      </div>

      <div class="flex  flex-col">
        <div class="flex gap-3">
          <label for="age" class="w-20">Age<span class="text-red-400">*</span></label>
          <input type="number" id="age" formControlName="age" class="border px-2">
        </div>
        <app-form-error-label [control]="myForm.get('age')!" />
      </div>

      <div class="flex  flex-col">
        <div class="flex gap-3">
          <label for="photo" class="w-20">Foto</label>
          <input type="file" id="photo" (change)="onFileSelected($event)" class="border px-2 w-52" #photoFile>
        </div>
      </div>


      <div class="flex justify-between mt-10">
        <button type="button" routerLink="/users"
          class="bg-blue-500 text-white py-1 px-3 rounded-sm cursor-pointer">Volver</button>
        <button type="submit" [disabled]="loading()" class="bg-red-400 text-white py-1 px-3 rounded-sm cursor-pointer
          ">{{isNewUser()?'Registrar': 'Actualizar'}}</button>
      </div>

    </form>


    @if (loading()) {
    <!-- background -->
    <div class="fixed inset-0 bg-black/50 z-10"></div>
    
    <div class="fixed z-20 top-1/4 w-1/4">
      <div class="flex gap-5 items-center justify-center rounded-sm   bg-white h-30">
        <span class="animate-spin border-4 border-blue-500 border-t-transparent rounded-full w-10 h-10"></span>
        Guardando usuario...
      </div>
    </div>
    }

  </div>
</section>
