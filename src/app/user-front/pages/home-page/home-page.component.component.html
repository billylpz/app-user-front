<div class="my-5">
  <h1 class="text-3xl font-semibold text-center mb-10">MANTENIMIENTO DE USUARIOS</h1>

  <button type="button" routerLink="/form" class="bg-blue-400 text-white px-3 py-1 rounded-sm mb-10
  cursor-pointer"
  >Crear Usuario</button>

  <table class="grid grid-cols-4">
    @for (user of usersResource.value(); track user) {
    <app-user-card [user]="user" />

    }

  </table>


</div>
